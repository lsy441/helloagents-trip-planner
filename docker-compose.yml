services:
  backend:
    build: ./backend
    container_name: trip-planner-backend
    ports:
      - "8000:8000"
    environment:
      - AMAP_API_KEY=${AMAP_API_KEY}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_ID=${LLM_MODEL_ID}
      - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=tripplanner
      - POSTGRES_PASSWORD=tripplanner123
      - POSTGRES_DB=tripplanner
      - LOG_LEVEL=INFO
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trip-planner-network

  frontend:
    build: ./frontend
    container_name: trip-planner-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - trip-planner-network

  redis:
    image: redis:7-alpine
    container_name: trip-planner-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - trip-planner-network

  postgres:
    image: postgres:16-alpine
    container_name: trip-planner-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=tripplanner
      - POSTGRES_PASSWORD=tripplanner123
      - POSTGRES_DB=tripplanner
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tripplanner -d tripplanner" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - trip-planner-network

networks:
  trip-planner-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
